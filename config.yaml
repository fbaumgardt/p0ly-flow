# p0ly-flow configuration
# Anchors: SCHEMA.md §4

project_settings:
  experiment_name: "p0ly_bootstrap"
  input_format: "BrainVision" # BrainVision | BIDS
  data_directory: "data/raw/" # BV: root with sub-{id}/ dirs; BIDS: BIDS dataset root
  output_directory: "data/derivatives/"
  task: "rest" # task label: embedded in BV filenames + BIDS entity
  montage: "easycap-M1" # MNE builtin montage applied on ingestion

subjects:
  - "001" # Bootstrap: single placeholder subject (bare ID)

ingestion:
  # SCHEMA §4 / ADR-005 §3 amendment (US-009): manifest-driven multi-segment
  # ingestion. One row per recording segment; the merge_recordings rule
  # concatenates a subject's segments (N >= 1) into a single desc-raw FIF.
  # Hand-authored for the bootstrap; regenerate via `scripts/create_tsv.py`.
  manifest: "metadata/manifest.tsv"

preprocessing:
  # All keys optional — omit a key to skip that step (see SCHEMA §preprocessing / ADR-004).
  l_freq: 1.0
  h_freq: 100.0
  bad_channel_z_thresh: 2.5
  interval_reject_z_thresh: 3.0
  interval_window_ms: 500
  ica_strategy: "mne-icalabel" # find_bads_eog | mne-icalabel
  icalabel_threshold: 0.75 # sliding-window peak-to-peak Z-score (SCHEMA §preprocessing)

epoching:
  # Per-timelock (tmin, tmax) epoch windows — analysis-run config (ADR-006).
  # The spec (metadata.experiment_spec) owns the timelock event-code map only;
  # keys here MUST match the spec's timelock keys (validate_intervals errors on
  # a config-side typo, warns if the spec declares a timelock not run here).
  intervals:
    stim: [-0.2, 1.2]
    prob: [-0.2, 1.2]
    fdb: [-0.2, 1.0]
    resp: [-1.2, 0.2]
  # Shared baseline window (seconds) across timelocks.
  baseline: [-0.2, 0.0]

metadata:
  # SCHEMA §4: path to the experiment metadata YAML spec. Specs live in
  # metadata/specs/{experiment}.yaml.
  experiment_spec: "metadata/specs/dmss.yaml"
  # Optional companion CSV aligned positionally to trials (see ExperimentSpec.csv_columns).
  csv_columns: null
  # One row per selection for experiments with ExperimentSpec.trial_expander (e.g. IGT).
  expand_trials: false

group_aggregation:
  cohort_file: "data/metadata/participants.tsv"
  aggregate_by_cohorts: ["control", "patient", "all_combined"]
  condition_splits:
    correct_trials: "Correct == True"
    incorrect_trials: "Correct == False"

analysis:
  run_erp: false
  run_psd: false
  run_connectivity: false
  run_cfc: false
  run_regression: false
  run_decoding: false
